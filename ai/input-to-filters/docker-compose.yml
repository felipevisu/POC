services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: webmotors
      POSTGRES_PASSWORD: webmotors
      POSTGRES_DB: webmotors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmotors -d webmotors"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webmotors

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5001:5001"
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webmotors

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:5001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - backend
    networks:
      - webmotors

volumes:
  postgres_data:

networks:
  webmotors:
