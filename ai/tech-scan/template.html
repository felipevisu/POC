<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>tech·scan report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a12; --surface: #13131f; --surface2: #1a1a2a; --surface3: #1f1f32;
    --border: #272740; --border-hover: #3a3a58;
    --text: #eeeef3; --muted: #8b8fa7; --dim: #3d3f56;
    --cyan: #00d4ff; --purple: #918cf8; --green: #3ee8a8;
    --red: #ff7b93; --amber: #ffb340; --pink: #c49aff;
    --blue: #5ba4f5; --teal: #2dd4bf; --orange: #fb923c;
    --radius: 12px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; padding: 2rem 2.5rem; min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* ── HEADER ─────────────────────────── */
  header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
  .header-left {}
  .logo { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800; letter-spacing: -0.02em; }
  .logo-tech { color: var(--cyan); }
  .logo-dot { color: var(--purple); }
  .logo-scan { color: var(--text); }
  .subtitle { color: var(--muted); font-size: 12px; letter-spacing: 0.15em; margin-top: 6px; text-transform: uppercase; }
  .meta-line { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .meta-line span { color: var(--muted); }

  /* ── SEARCH ─────────────────────────── */
  .search-box { position: relative; min-width: 280px; }
  .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 10px 18px 10px 42px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--cyan); }
  .search-box input::placeholder { color: var(--dim); }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 15px; pointer-events: none; }

  /* ── STATS ──────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.4rem; text-align: center; transition: border-color 0.2s; cursor: pointer; }
  .stat:hover { border-color: var(--border-hover); }
  .stat.active { border-color: var(--cat-color, var(--cyan)); box-shadow: 0 0 20px color-mix(in srgb, var(--cat-color, var(--cyan)) 15%, transparent); }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--cat-color, var(--cyan)); }
  .stat-label { color: var(--muted); font-size: 11px; letter-spacing: 0.12em; margin-top: 2px; font-weight: 600; text-transform: uppercase; }

  /* ── FILTER PILLS ───────────────────── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 7px 16px; border-radius: 999px; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; font-family: inherit; text-transform: uppercase; }
  .pill:hover { border-color: var(--border-hover); }
  .pill.active { color: var(--pill-color, var(--text)); border-color: color-mix(in srgb, var(--pill-color, var(--text)) 60%, transparent); background: color-mix(in srgb, var(--pill-color, var(--text)) 8%, transparent); }
  .pill .count { background: var(--border); border-radius: 999px; padding: 1px 8px; font-size: 11px; color: var(--muted); font-weight: 700; }
  .pill.active .count { background: color-mix(in srgb, var(--pill-color, var(--text)) 20%, transparent); color: var(--pill-color, var(--text)); }

  /* ── CARDS ──────────────────────────── */
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .card:hover { border-color: var(--border-hover); }
  .card-main { padding: 1.25rem 1.5rem; cursor: pointer; user-select: none; }
  .card-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .card-identity { display: flex; align-items: center; gap: 10px; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cat-color, var(--muted)); flex-shrink: 0; }
  .tech-name { font-weight: 700; font-size: 16px; color: var(--text); }
  .version-tag { background: rgba(145,140,248,0.12); color: var(--purple); border: 1px solid rgba(145,140,248,0.3); border-radius: 6px; padding: 2px 9px; font-size: 12px; font-weight: 600; }
  .card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-cat { background: color-mix(in srgb, var(--cat-color, var(--muted)) 12%, transparent); color: var(--cat-color, var(--muted)); border: 1px solid color-mix(in srgb, var(--cat-color, var(--muted)) 30%, transparent); }
  .badge-noversion { background: rgba(255,123,147,0.1); color: var(--red); border: 1px solid rgba(255,123,147,0.25); }
  .badge-features { background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid rgba(0,212,255,0.25); font-size: 10px; }
  .card-purpose { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
  .card-usedin { color: var(--text); font-size: 13px; margin-top: 6px; line-height: 1.5; }
  .card-usedin strong { color: var(--cyan); font-weight: 600; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .chevron { color: var(--dim); font-size: 18px; transition: transform 0.2s; margin-left: auto; padding-left: 12px; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(90deg); }

  /* ── EXPANDABLE FEATURES ────────────── */
  .card-details { display: none; }
  .card.open .card-details { display: block; }
  .features-section { padding: 0 1.5rem 1.5rem 1.5rem; border-top: 1px solid var(--border); }
  .features-header { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; font-weight: 700; margin: 1.25rem 0 1rem 0; display: flex; align-items: center; gap: 8px; }
  .features-header .feat-count { color: var(--cat-color, var(--cyan)); }

  /* ── FEATURE ITEMS (rich) ───────────── */
  .feature-list { display: flex; flex-direction: column; gap: 10px; }
  .feature-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; transition: border-color 0.2s; }
  .feature-item:hover { border-color: var(--border-hover); }
  .feature-name { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 8px; }
  .feature-name::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--cat-color, var(--muted)); flex-shrink: 0; }
  .feature-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 8px; }
  .feature-why { font-size: 12px; line-height: 1.6; padding: 8px 12px; background: var(--surface3); border-left: 3px solid var(--cat-color, var(--dim)); border-radius: 0 6px 6px 0; }
  .feature-why-label { color: var(--cat-color, var(--cyan)); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; }
  .feature-why-text { color: var(--text); opacity: 0.85; }

  /* ── CODE EXAMPLE ───────────────────── */
  .feature-code { margin-top: 10px; }
  .feature-code-label { color: var(--dim); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .feature-code-label::before { content: ''; display: inline-block; width: 14px; height: 1px; background: var(--dim); }
  .feature-code pre { background: #0d0d18; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; overflow-x: auto; font-size: 12px; line-height: 1.65; color: var(--muted); tab-size: 2; }
  .feature-code code { font-family: 'JetBrains Mono', monospace; }
  /* basic syntax highlights */
  .feature-code .kw { color: var(--purple); }
  .feature-code .str { color: var(--green); }
  .feature-code .cm { color: var(--dim); font-style: italic; }
  .feature-code .fn { color: var(--cyan); }
  .feature-code .num { color: var(--amber); }
  .feature-code .type { color: var(--pink); }

  /* ── SOURCE FILES ─────────────────────── */
  .source-files { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .source-file-tag { background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15); border-radius: 5px; padding: 2px 8px; font-size: 11px; color: var(--cyan); opacity: 0.7; }

  /* ── REVIEW PANEL ────────────────────── */
  .review-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; }
  .review-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .review-title .check { color: var(--green); }
  .review-title .warn { color: var(--amber); }
  .review-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1rem; }
  .review-stat { background: var(--surface2); border-radius: 8px; padding: 12px 16px; }
  .review-stat-num { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
  .review-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .review-notes { font-size: 13px; color: var(--muted); line-height: 1.6; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--purple); }
  .review-missing { margin-top: 12px; }
  .review-missing-title { font-size: 11px; color: var(--red); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .review-missing-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .review-missing-tag { background: rgba(255,123,147,0.1); color: var(--red); border: 1px solid rgba(255,123,147,0.25); border-radius: 5px; padding: 2px 8px; font-size: 11px; }

  /* ── EMPTY STATE ────────────────────── */
  .empty { color: var(--muted); font-size: 15px; padding: 3rem 0; text-align: center; }

  /* ── FOOTER ─────────────────────────── */
  footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--dim); font-size: 11px; text-align: center; letter-spacing: 0.08em; }

  /* ── EXPAND ALL ─────────────────────── */
  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 8px; }
  .toolbar-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; font-weight: 600; }
  .toolbar-btn:hover { border-color: var(--border-hover); color: var(--text); }

  /* ── RESPONSIVE ─────────────────────── */
  @media (max-width: 640px) {
    body { padding: 1.2rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .card-top { flex-direction: column; align-items: flex-start; }
    .search-box { min-width: 100%; }
    header { flex-direction: column; }
    .feature-item { padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo"><span class="logo-tech">tech</span><span class="logo-dot">&middot;</span><span class="logo-scan">scan</span></div>
    <div class="subtitle">Codebase Technology Report</div>
    <div class="meta-line">project: <span id="project-name">-</span></div>
    <div class="meta-line">scanned: <span id="scanned-at">-</span></div>
  </div>
  <div class="search-box">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="search" placeholder="Search technologies, features..." autocomplete="off" />
  </div>
</header>

<div class="stats" id="stats"></div>
<div id="review-panel"></div>
<div class="filters" id="filters"></div>
<div class="toolbar" id="toolbar"></div>
<div class="cards" id="cards"></div>
<footer>generated by <strong>tech&middot;scan</strong> &mdash; claude code skill</footer>

<script>
const CAT_META = {
  language:  { label: 'Languages',  icon: '&#10096;/&#10097;', color: '#00d4ff'  },
  framework: { label: 'Frameworks', icon: '&#11045;',          color: '#c49aff'  },
  library:   { label: 'Libraries',  icon: '&#9707;',           color: '#3ee8a8'  },
  database:  { label: 'Databases',  icon: '&#9921;',           color: '#5ba4f5'  },
  service:   { label: 'Services',   icon: '&#9729;',           color: '#ffb340'  },
  tool:      { label: 'Tools',      icon: '&#9881;',           color: '#fb923c'  },
  protocol:  { label: 'Protocols',  icon: '&#8644;',           color: '#2dd4bf'  },
  platform:  { label: 'Platforms',  icon: '&#9654;',           color: '#918cf8'  },
};

// ── DATA INJECTED BY SKILL ──────────────────────────────
const DATA = __TECH_SCAN_DATA__;
// ────────────────────────────────────────────────────────

let activeFilter = 'all';
let searchQuery = '';
let openCards = new Set();

function getCatColor(cat) {
  return CAT_META[cat]?.color || '#8b8fa7';
}

function getFeatureText(f) {
  if (typeof f === 'string') return f;
  return [f.name || '', f.description || '', f.why || ''].join(' ');
}

function filtered() {
  return DATA.technologies.filter(t => {
    const matchCat = activeFilter === 'all' || t.category === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      t.name.toLowerCase().includes(q) ||
      (t.purpose || '').toLowerCase().includes(q) ||
      (t.usedFor || '').toLowerCase().includes(q) ||
      (t.features || []).some(f => getFeatureText(f).toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function highlightCode(code) {
  // Basic syntax highlighting — keywords, strings, comments, numbers, types
  let h = esc(code);
  // comments: // ... and # ...
  h = h.replace(/(\/\/.*|#.*)/g, '<span class="cm">$1</span>');
  // strings: "..." and '...' and `...`
  h = h.replace(/(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;|`[^`]*?`)/g, '<span class="str">$1</span>');
  // keywords
  h = h.replace(/\b(import|export|from|const|let|var|function|async|await|return|if|else|for|class|interface|type|extends|implements|new|throw|try|catch|default|use|module|require|def|fn|pub|struct|enum|match|impl|trait|CREATE|SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|ALTER|TABLE|ADD|DROP|INDEX|ON|AS|model|datasource|generator)\b/g, '<span class="kw">$1</span>');
  // types (capitalized words that look like types)
  h = h.replace(/\b([A-Z][a-zA-Z0-9]*(?:&lt;[^&]*?&gt;)?)\b/g, '<span class="type">$1</span>');
  // numbers
  h = h.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  return h;
}

function renderFeature(f) {
  // Support both string features (legacy) and rich object features
  if (typeof f === 'string') {
    return `<div class="feature-item">
      <div class="feature-name">${esc(f)}</div>
    </div>`;
  }

  const codeBlock = f.codeExample ? `
    <div class="feature-code">
      <div class="feature-code-label">Usage example</div>
      <pre><code>${highlightCode(f.codeExample)}</code></pre>
    </div>` : '';

  return `<div class="feature-item">
    <div class="feature-name">${esc(f.name || 'Feature')}</div>
    ${f.description ? `<div class="feature-desc">${esc(f.description)}</div>` : ''}
    ${f.why ? `<div class="feature-why">
      <div class="feature-why-label">Why it's used</div>
      <div class="feature-why-text">${esc(f.why)}</div>
    </div>` : ''}
    ${codeBlock}
  </div>`;
}

function render() {
  document.getElementById('project-name').textContent = DATA.projectName || '-';
  document.getElementById('scanned-at').textContent = DATA.scannedAt ? new Date(DATA.scannedAt).toLocaleString() : '-';

  // ── review panel
  const r = DATA.review;
  if (r) {
    const hasMissing = r.missingDeps && r.missingDeps.length > 0;
    const icon = hasMissing ? '<span class="warn">&#9888;</span>' : '<span class="check">&#10003;</span>';
    const titleText = hasMissing ? 'Scan Review — Issues Found' : 'Scan Review — All Clear';
    document.getElementById('review-panel').innerHTML = `
      <div class="review-panel">
        <div class="review-title">${icon} ${titleText}</div>
        <div class="review-grid">
          <div class="review-stat">
            <div class="review-stat-num" style="color:var(--cyan)">${r.declaredDepsCount || 0}</div>
            <div class="review-stat-label">Declared Dependencies</div>
          </div>
          <div class="review-stat">
            <div class="review-stat-num" style="color:var(--green)">${r.capturedDepsCount || 0}</div>
            <div class="review-stat-label">Captured in Report</div>
          </div>
          <div class="review-stat">
            <div class="review-stat-num" style="color:${hasMissing ? 'var(--red)' : 'var(--green)'}">${(r.missingDeps || []).length}</div>
            <div class="review-stat-label">Missing</div>
          </div>
          <div class="review-stat">
            <div class="review-stat-num" style="color:var(--muted)">${(r.manifestsRead || []).length}</div>
            <div class="review-stat-label">Manifests Read</div>
          </div>
        </div>
        ${r.notes ? `<div class="review-notes">${esc(r.notes)}</div>` : ''}
        ${hasMissing ? `
          <div class="review-missing">
            <div class="review-missing-title">Missing dependencies</div>
            <div class="review-missing-list">
              ${r.missingDeps.map(d => `<span class="review-missing-tag">${esc(d)}</span>`).join('')}
            </div>
          </div>` : ''}
      </div>`;
  }

  // ── stats
  const s = DATA.summary;
  const cats = Object.entries(s.byCategory || {}).filter(([,v]) => v > 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat ${activeFilter === 'all' ? 'active' : ''}" style="--cat-color:var(--cyan)" onclick="setFilter('all')">
      <div class="stat-num">${s.totalTechnologies}</div>
      <div class="stat-label">Total</div>
    </div>
    ${cats.map(([cat, n]) => `
      <div class="stat ${activeFilter === cat ? 'active' : ''}" style="--cat-color:${getCatColor(cat)}" onclick="setFilter('${cat}')">
        <div class="stat-num">${n}</div>
        <div class="stat-label">${CAT_META[cat]?.label || cat}</div>
      </div>
    `).join('')}
  `;

  // ── filters
  const allCats = [...new Set(DATA.technologies.map(t => t.category))];
  document.getElementById('filters').innerHTML = `
    <button class="pill ${activeFilter === 'all' ? 'active' : ''}" style="--pill-color:#eeeef3" onclick="setFilter('all')">
      &#9673; ALL
    </button>
    ${allCats.map(cat => {
      const count = DATA.technologies.filter(t => t.category === cat).length;
      const meta = CAT_META[cat] || {};
      return `<button class="pill ${activeFilter === cat ? 'active' : ''}" style="--pill-color:${getCatColor(cat)}" onclick="setFilter('${cat}')">
        ${meta.icon || '&middot;'} ${(meta.label || cat).toUpperCase()}
        <span class="count">${count}</span>
      </button>`;
    }).join('')}
  `;

  // ── toolbar
  document.getElementById('toolbar').innerHTML = `
    <button class="toolbar-btn" onclick="expandAll()">Expand all</button>
    <button class="toolbar-btn" onclick="collapseAll()">Collapse all</button>
  `;

  // ── cards
  const techs = filtered();
  if (techs.length === 0) {
    document.getElementById('cards').innerHTML = '<div class="empty">No technologies match your search.</div>';
    return;
  }

  document.getElementById('cards').innerHTML = techs.map((t, i) => {
    const meta = CAT_META[t.category] || {};
    const color = getCatColor(t.category);
    const id = `card-${t.name.replace(/[^a-zA-Z0-9]/g, '_')}-${i}`;
    const isOpen = openCards.has(id);
    const features = t.features || [];
    const featCount = features.length;

    const featuresHTML = features.map(f => renderFeature(f)).join('');

    return `
      <div class="card ${isOpen ? 'open' : ''}" style="--cat-color:${color}" id="${id}">
        <div class="card-main" onclick="toggleCard('${id}')">
          <div class="card-top">
            <div class="card-identity">
              <span class="cat-dot"></span>
              <span class="tech-name">${esc(t.name)}</span>
              ${t.version ? `<span class="version-tag">v${esc(t.version)}</span>` : ''}
            </div>
            <div class="card-badges">
              <span class="badge badge-cat">${esc(meta.label || t.category)}</span>
              ${featCount > 0 ? `<span class="badge badge-features">${featCount} feature${featCount !== 1 ? 's' : ''}</span>` : ''}
              ${!t.version ? '<span class="badge badge-noversion">no version</span>' : ''}
            </div>
            <span class="chevron">&#9656;</span>
          </div>
          ${t.purpose ? `<div class="card-purpose">${esc(t.purpose)}</div>` : ''}
          ${t.usedFor ? `<div class="card-usedin"><strong>In this project: </strong>${esc(t.usedFor)}</div>` : ''}
          ${(t.sourceFiles && t.sourceFiles.length) ? `<div class="source-files">${t.sourceFiles.map(f => `<span class="source-file-tag">${esc(f)}</span>`).join('')}</div>` : ''}
        </div>
        ${featCount > 0 ? `
        <div class="card-details">
          <div class="features-section">
            <div class="features-header">
              Features used in this project
              <span class="feat-count">(${featCount})</span>
            </div>
            <div class="feature-list">${featuresHTML}</div>
          </div>
        </div>` : ''}
      </div>`;
  }).join('');
}

function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function setFilter(key) {
  activeFilter = key;
  render();
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.card').forEach(c => {
    openCards.add(c.id);
    c.classList.add('open');
  });
}

function collapseAll() {
  openCards.clear();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
}

document.getElementById('search').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  render();
});

render();
</script>
</body>
</html>
