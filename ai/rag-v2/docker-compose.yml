services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Webhook target — name "WORKER" becomes ARN identifier
      # arn:minio:sqs::WORKER:webhook used by minio-setup
      MINIO_NOTIFY_WEBHOOK_ENABLE_WORKER: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_WORKER: "http://worker:8001/webhook"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8001:8001"

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./documents/pdf:/source-pdfs:ro
      - ./infra/minio-setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    restart: "no"

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      CLAUDE_MODEL: claude-sonnet-4-5
    ports:
      - "8000:8000"

  documents-ui:
    build:
      context: ./services/documents-ui
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"

  chat-ui:
    build:
      context: ./services/chat-ui
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3001:3001"

volumes:
  pgdata:
  miniodata:
