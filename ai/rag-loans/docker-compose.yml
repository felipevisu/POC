services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_NOTIFY_WEBHOOK_ENABLE_WORKER: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_WORKER: "http://worker:8001/webhook"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/docling:/root/.cache/docling
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
      worker:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./documents/pdf:/source-pdfs:ro
      - ./infra/minio-setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    restart: "no"

  document-api:
    build:
      context: ./services/document-api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: documents
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"

  chat:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    depends_on:
      - document-api
    env_file:
      - ./.env
    environment:
      DOCUMENT_API_URL: http://document-api:8000
      CLAUDE_MODEL: claude-sonnet-4-6
    ports:
      - "3001:3001"

  documents-ui:
    build:
      context: ./services/documents-ui
      dockerfile: Dockerfile
    depends_on:
      - document-api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
