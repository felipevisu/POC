version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: electromart-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: electromart
      POSTGRES_PASSWORD: electromart123
      POSTGRES_DB: electromart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-sources/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electromart -d electromart"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  mongo:
    image: mongo:7-jammy
    container_name: electromart-mongo
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - electromart-network

  soap-service:
    build:
      context: ./data-sources/soap
      dockerfile: Dockerfile
    container_name: electromart-soap
    environment:
      MONGO_URI: mongodb://mongo:27017
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      - mongo
    networks:
      - electromart-network

  postgres-data-generator:
    build:
      context: ./data-sources/postgresql
      dockerfile: Dockerfile
    container_name: electromart-postgres-generator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: electromart
      DB_PASSWORD: electromart123
      DB_NAME: electromart
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - electromart-network

  kafka:
    image: apache/kafka:3.7.1
    container_name: electromart-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: electromart-kafka-cluster-01
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
    ports:
      - "19092:19092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - electromart-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: electromart-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: electromart
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      JAVA_OPTS: "-Xms64M -Xmx128M"
    ports:
      - "8888:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - electromart-network

  kafka-connect:
    image: debezium/connect:2.5
    container_name: electromart-kafka-connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: electromart-connect
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_SCHEDULED_REBALANCE_MAX_DELAY_MS: "0"
      HEAP_OPTS: "-Xms256M -Xmx512M"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - electromart-network

  postgres-connector-init:
    build:
      context: ./services/postgres-connector-source
      dockerfile: Dockerfile.init
    container_name: electromart-postgres-connector-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    networks:
      - electromart-network

  postgres-connector-source:
    build:
      context: ./services/postgres-connector-source
      dockerfile: Dockerfile
    container_name: electromart-postgres-connector
    environment:
      KAFKA_BROKER: kafka:9092
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-connect:
        condition: service_healthy
    networks:
      - electromart-network

  csv-files:
    build:
      context: ./data-sources/csv-files
      dockerfile: Dockerfile
    container_name: electromart-csv-files
    environment:
      OUTPUT_DIR: /data/inbox
      GENERATION_INTERVAL: 10000
      RECORDS_PER_FILE: 50
    volumes:
      - csv_data:/data/inbox
    networks:
      - electromart-network

  csv-connector-source:
    build:
      context: ./services/csv-connector-source
      dockerfile: Dockerfile
    container_name: electromart-csv-connector
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: csv
      INBOX_DIR: /data/inbox
      PROCESSED_DIR: /data/inbox/processed
      POLL_INTERVAL: "5000"
      JAVA_OPTS: "-Xms32M -Xmx64M"
    volumes:
      - csv_data:/data/inbox
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - electromart-network

  soap-connector-source:
    build:
      context: ./services/soap-connector-source
      dockerfile: Dockerfile
    container_name: electromart-soap-connector
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: soap
      SOAP_URL: http://soap-service:8080/sales
      PAGE_SIZE: "100"
      POLL_INTERVAL: "5000"
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
      soap-service:
        condition: service_healthy
    networks:
      - electromart-network

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: electromart-timescaledb
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales123
      POSTGRES_DB: salesdb
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./services/sales-aggregator/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d salesdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - electromart-network

  sales-aggregator:
    build:
      context: ./services/sales-aggregator
      dockerfile: Dockerfile
    container_name: electromart-sales-aggregator
    environment:
      KAFKA_BROKER: kafka:9092
      TIMESCALEDB_URL: jdbc:postgresql://timescaledb:5432/salesdb
      TIMESCALEDB_USER: sales
      TIMESCALEDB_PASSWORD: sales123
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - electromart-network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: electromart-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sales-dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - electromart-network

volumes:
  postgres_data:
  csv_data:
  mongo_data:
  timescaledb_data:
  grafana_data:
  kafka_data:

networks:
  electromart-network:
    driver: bridge
