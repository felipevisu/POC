version: "3.8"

services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: kafka-cluster-01
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
    ports:
      - "19092:19092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-network

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic raw_orders --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parsed_orders --partitions 1 --replication-factor 1
        echo "Topics created."
    networks:
      - pipeline-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: pipeline
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      JAVA_OPTS: "-Xms64M -Xmx128M"
    ports:
      - "8888:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pipeline-network

  order-generator:
    build:
      context: ./order-generator
      dockerfile: Dockerfile
    container_name: order-generator
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_NAME: raw_orders
      GENERATION_INTERVAL: 5000
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pipeline-network

  order-parser:
    build:
      context: ./order-parser
      dockerfile: Dockerfile
    container_name: order-parser
    environment:
      KAFKA_BROKER: kafka:9092
      INPUT_TOPIC: raw_orders
      OUTPUT_TOPIC: parsed_orders
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pipeline-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-network

  order-persistence:
    build:
      context: ./order-persistence
      dockerfile: Dockerfile
    container_name: order-persistence
    environment:
      KAFKA_BROKER: kafka:9092
      INPUT_TOPIC: parsed_orders
      DB_URL: jdbc:postgresql://timescaledb:5432/orders
      DB_USER: postgres
      DB_PASSWORD: postgres
      JAVA_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    networks:
      - pipeline-network

volumes:
  kafka_data:
  timescaledb_data:

networks:
  pipeline-network:
    driver: bridge
