global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]