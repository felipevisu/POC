{
  "connections": {
    "dating-mysql": {
      "provider": "mysql",
      "driver": "mysql8",
      "name": "dating (mysql)",
      "save-password": true,
      "configuration": {
        "host": "mysql",
        "port": "3306",
        "database": "dating",
        "url": "jdbc:mysql://mysql:3306/dating",
        "auth-model": "native",
        "user": "root",
        "password": "root",
        "properties": {
          "allowPublicKeyRetrieval": "true",
          "useSSL": "false"
        }
      }
    }
  }
}
