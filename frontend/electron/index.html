<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'" />
  <title>Electron POC - Text Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="toolbar">
    <button id="btn-open">Open</button>
    <button id="btn-save">Save</button>
    <button id="btn-info">System Info</button>
    <span class="file-name" id="file-name">Untitled</span>
  </div>

  <div class="editor-container">
    <div class="line-numbers" id="line-numbers">1</div>
    <textarea id="editor" spellcheck="false" placeholder="Start typing or open a file..."></textarea>
  </div>

  <div class="status-bar">
    <span id="cursor-pos">Ln 1, Col 1</span>
    <span id="char-count">0 characters</span>
  </div>

  <div class="info-panel" id="info-panel" style="display: none;">
    <h3>System Information</h3>
    <div class="info-grid" id="info-grid"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
